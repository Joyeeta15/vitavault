<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VitaVault | User Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Main CSS -->
    <link rel="stylesheet" href="../assets/css/profile.css">
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">

  <div class="logo">
    <span class="logo-icon">+</span>
    <h3>VitaVault</h3>
    <small>Patient Portal</small>
  </div>

  <nav class="nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="records.html">Health Records</a>
    <a href="share.html">Share Link</a>
</nav>

  <!-- USER (BOTTOM) -->
  <!-- USER (BOTTOM) -->
    <div class="user" onclick="window.location.href='profile.html'">
  <div class="avatar" id="avatarLetter"></div>
  <div>
    <strong id="dashboardName">...</strong>
    <small id="dashboardEmail">...</small>
  </div>
</div>

  

  </aside>


  <!-- MAIN -->
<main class="main-content">


<section class="info-card">

<main class="main-content">

<div class="profile-header">

<div>
    <h1>Personal Details</h1>
    <p>Manage your personal and medical information</p>
</div>

<div class="header-actions">

    <button id="editBtn" class="edit-btn">
        Edit Details
    </button>

    <button id="logoutBtn" class="logout-btn">
        Logout
    </button>

</div>

</div>

<!-- BASIC INFORMATION -->

<section class="info-card">

  <h2>👤 Basic Information</h2>

<div class="info-grid">

    <div class="field">
        <label>Full Name</label>
        <div class="view-mode" id="fullNameText">...</div>
        <input type="text" id="fullName"
               class="editable edit-mode"
               style="display:none;">
    </div>

    <div class="field">
        <label>ID</label>
        <div class="view-mode" id="patientIdText">...</div>
    </div>

    <div class="field">
        <label>Date of Birth</label>
        <div class="view-mode" id="dobText">...</div>
        <input type="date" id="dob"
               class="editable edit-mode"
               style="display:none;">
    </div>

    <div class="field">
        <label>Age</label>
        <div class="view-mode" id="ageText">...</div>
    </div>

    <div class="field">
        <label>Gender</label>
        <div class="view-mode" id="genderText">...</div>

        <select id="gender"
                class="editable edit-mode"
                style="display:none;">

            <option>Male</option>
            <option>Female</option>
            <option>Other</option>

        </select>
    </div>

    <div class="field">
        <label>Blood Group</label>
        <div class="view-mode" id="bloodGroupText">...</div>

        <input type="text"
               id="bloodGroup"
               class="editable edit-mode"
               style="display:none;">
    </div>

</div>


</section>

<!-- CONTACT INFORMATION -->

<section class="info-card">


<h2>📞 Contact Information</h2>

<div class="info-grid">

    <div class="field">
        <label>Email Address</label>
        <div class="view-mode" id="emailText">...</div>
    </div>

    <div class="field">
        <label>Phone Number</label>
        <div class="view-mode" id="phoneText">...</div>

        <input type="text"
               id="phone"
               class="editable edit-mode"
               style="display:none;">
    </div>

    <div class="field full-width">
        <label>Address</label>
        <div class="view-mode" id="addressText">...</div>

        <input type="text"
               id="address"
               class="editable edit-mode"
               style="display:none;">
    </div>

</div>


</section>

<!-- EMERGENCY CONTACT -->

<section class="info-card">


<h2>🚨 Emergency Contact</h2>

<div class="info-grid">

    <div class="field">
        <label>Contact Name</label>
        <div class="view-mode" id="emergencyNameText">...</div>

        <input type="text"
               id="emergencyName"
               class="editable edit-mode"
               style="display:none;">
    </div>

    <div class="field">
        <label>Relationship</label>
        <div class="view-mode" id="relationshipText">...</div>

        <input type="text"
               id="relationship"
               class="editable edit-mode"
               style="display:none;">
    </div>

    <div class="field">
        <label>Phone Number</label>
        <div class="view-mode" id="emergencyPhoneText">...</div>

        <input type="text"
               id="emergencyPhone"
               class="editable edit-mode"
               style="display:none;">
    </div>

    <div class="field">
        <label>Email Address</label>
        <div class="view-mode" id="emergencyEmailText">...</div>

        <input type="email"
               id="emergencyEmail"
               class="editable edit-mode"
               style="display:none;">
    </div>

</div>


</section>

</main>


</section>




</main>



  
</div>

<!-- DASHBOARD JS -->
<script type="module" src="../assets/js/profile.js"></script>

</body>
</html>
