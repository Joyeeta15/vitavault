<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VitaVault | View Record</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f7fb;
}

.header{
    background:white;
    padding:20px 40px;
    border-bottom:1px solid #e5e7eb;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.back-btn{
    background:#2563eb;
    color:white;

    border:none;
    padding:12px 20px;

    border-radius:10px;
    cursor:pointer;
}

.back-btn:hover{
    background:#1d4ed8;
}

.title{
    font-size:24px;
    font-weight:600;
}

.viewer-container{
    padding:20px;
}

iframe{
    width:100%;
    height:85vh;

    border:none;
    border-radius:16px;

    background:white;
    box-shadow:0 2px 12px rgba(0,0,0,.08);
}

</style>

</head>

<body>

<div class="header">

    <button
    class="back-btn"
    onclick="history.back()">
        ← Back
    </button>

    <div class="title">
        Medical Record Viewer
    </div>

</div>

<div class="viewer-container">

    <iframe
        id="viewer">
    </iframe>

</div>

<script>

const params =
    new URLSearchParams(window.location.search);

const fileUrl =
    params.get("file");

document
    .getElementById("viewer")
    .src = fileUrl;

</script>

</body>
</html>
