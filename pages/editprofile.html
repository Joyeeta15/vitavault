<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VitaVault | User Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Main CSS -->
    <link rel="stylesheet" href="../assets/css/editprofile.css">
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">

  <div class="logo">
    <span class="logo-icon">+</span>
    <h3>VitaVault</h3>
    <small>Patient Portal</small>
  </div>

  <nav class="nav">
    <a href="dashboard.html" class="active">Dashboard</a>
    <a href="upload.html" >Upload</a>
    <a href="records.html">Health Records</a>
    <a href="prescriptions.html">Prescriptions</a>
    <a href="settings.html">Settings</a>
  </nav>

  <!-- USER (BOTTOM) -->
    <div class="user" onclick="window.location.href='profile.html'">
  <div class="avatar" id="avatarLetter"></div>
  <div>
    <strong id="dashboardName">...</strong>
    <small id="dashboardEmail">...</small>
  </div>
</div>

  

  </aside>


  <!-- MAIN -->
  <main class="main-content">
<form id="profileForm">


  <!-- PAGE HEADER -->
  <div class="page-header">
    <h1>Edit Profile</h1>
    <p>Update your personal information and medical details.</p>
  </div>

  <!-- PROFILE SUMMARY -->
  <section class="card profile-summary">
    <div class="profile-left">
      <div class="profile-img">
        <div class="profile-avatar" id="profileAvatar"></div>
        <span class="camera">📷</span>
      </div>
      <div>
        <h3>John Doe</h3>
        <p class="muted">Patient ID: 8839202</p>
        <span class="verified">✔ Verified Patient</span>
      </div>
    </div>

    <button type="button" class="outline-btn">Change Photo</button>

  </section>

  <!-- PERSONAL DETAILS -->
  <section class="card">
    <h2>👤 Personal Details</h2>

    <div class="form-grid">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name">
      </div>

      <div class="form-group">
        <label>Date of Birth</label>
        <input type="date" id="dob">
      </div>

      <div class="form-group">
  <label>Gender</label>
  <select id="gender">
    <option value="">Select</option>
    <option>Male</option>
    <option>Female</option>
    <option>Other</option>
  </select>
</div>


      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="phone">
      </div>

      <div class="form-group full">
        <label>Address</label>
        <input type="text" id="address">
      </div>
    </div>
  </section>

  <!-- PHYSICAL ATTRIBUTES -->
  <section class="card">
    <h2>🩺 Physical Attributes</h2>

    <div class="form-grid">
      <div class="form-group">
        <label>Blood Group</label>
        <select id="bloodGroup">
          <option>A+</option>
          <option>B+</option>
          <option>O+</option>
        </select>
      </div>

      <div class="form-group">
        <label>Height (cm)</label>
        <input type="number" id="height">
      </div>

      <div class="form-group">
        <label>Weight (kg)</label>
        <input type="number" id="weight">
      </div>
    </div>
  </section>

  <!-- EMERGENCY CONTACT -->
  <section class="card">
    <h2>🚨 Emergency Contact</h2>

    <div class="form-grid">
      <div class="form-group">
        <label>Contact Name</label>
        <input type="text" id="emergencyName">
      </div>

      <div class="form-group">
        <label>Relationship</label>
        <input type="text" id="relationship">
      </div>

      <div class="form-group full">
        <label>Emergency Phone</label>
        <input type="tel" id="emergencyPhone">
      </div>
    </div>
  </section>

  <!-- ACTION BUTTONS -->
  <div class="action-bar">
    <button class="btn-light">Cancel</button>
    <button class="btn-primary" type="submit">Save Changes</button>
  </div>
</form>
</main>


  
</div>

<script type="module" src="../assets/js/editprofile.js"></script>


</body>
</html>
