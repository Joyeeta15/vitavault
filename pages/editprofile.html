<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VitaVault | User Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Main CSS -->
    <link rel="stylesheet" href="../assets/css/editprofile.css">
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">

  <div class="logo">
    <span class="logo-icon">+</span>
    <h3>VitaVault</h3>
    <small>Patient Portal</small>
  </div>

  <nav class="nav">
    <a href="dashboard.html" class="active">Dashboard</a>
    <a href="upload.html" >Upload</a>
    <a href="records.html">Health Records</a>
    <a href="prescriptions.html">Prescriptions</a>
    <a href="settings.html">Settings</a>
  </nav>

  <!-- USER (BOTTOM) -->
  <div class="user" onclick="goToProfile()">
  <div class="avatar">A</div>
  <div>
    <strong>Alex Morgan</strong>
    <small>alex@email.com</small>
  </div>
</div>

  

  </aside>


  <!-- MAIN -->
  <main class="main-content">

  <!-- PAGE HEADER -->
  <div class="page-header">
    <h1>Edit Profile</h1>
    <p>Update your personal information and medical details.</p>
  </div>

  <!-- PROFILE SUMMARY -->
  <section class="card profile-summary">
    <div class="profile-left">
      <div class="profile-img">
        <img src="https://i.pravatar.cc/100" alt="Profile">
        <span class="camera">📷</span>
      </div>
      <div>
        <h3>John Doe</h3>
        <p class="muted">Patient ID: 8839202</p>
        <span class="verified">✔ Verified Patient</span>
      </div>
    </div>

    <button class="outline-btn">Change Photo</button>
  </section>

  <!-- PERSONAL DETAILS -->
  <section class="card">
    <h2>👤 Personal Details</h2>

    <div class="form-grid">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" value="John Doe">
      </div>

      <div class="form-group">
        <label>Date of Birth</label>
        <input type="date" value="1985-04-12">
      </div>

      <div class="form-group">
        <label>Gender</label>
        <select>
          <option>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" value="+1 (555) 000-0000">
      </div>

      <div class="form-group full">
        <label>Address</label>
        <input type="text" value="1234 Maplewood Drive, Springfield, IL 62704">
      </div>
    </div>
  </section>

  <!-- PHYSICAL ATTRIBUTES -->
  <section class="card">
    <h2>🩺 Physical Attributes</h2>

    <div class="form-grid">
      <div class="form-group">
        <label>Blood Group</label>
        <select>
          <option>A+</option>
          <option>B+</option>
          <option>O+</option>
        </select>
      </div>

      <div class="form-group">
        <label>Height (cm)</label>
        <input type="number" value="180">
      </div>

      <div class="form-group">
        <label>Weight (kg)</label>
        <input type="number" value="75">
      </div>
    </div>
  </section>

  <!-- EMERGENCY CONTACT -->
  <section class="card">
    <h2>🚨 Emergency Contact</h2>

    <div class="form-grid">
      <div class="form-group">
        <label>Contact Name</label>
        <input type="text" value="Jane Doe">
      </div>

      <div class="form-group">
        <label>Relationship</label>
        <input type="text" value="Spouse">
      </div>

      <div class="form-group full">
        <label>Emergency Phone</label>
        <input type="tel" value="+1 (555) 987-6543">
      </div>
    </div>
  </section>

  <!-- ACTION BUTTONS -->
  <div class="action-bar">
    <button class="btn-light">Cancel</button>
    <button class="btn-primary">Save Changes</button>
  </div>

</main>


  
</div>


</body>
</html>
